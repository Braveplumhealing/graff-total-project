name: Build & deploy site to GitHub Pages

# Builds the Eleventy site (content/ + src/ + legacy passthrough) and publishes _site/
# as the canonical public mirror. Runs on every merge to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci || npm install
      # GitHub Pages serves this project under /graff-total-project/, so build with that prefix.
      - run: npx @11ty/eleventy --pathprefix=/graff-total-project/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
