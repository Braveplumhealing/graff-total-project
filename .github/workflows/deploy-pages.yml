name: Build & deploy site to GitHub Pages

# Builds the Eleventy site and publishes _site/ to braveplumhealing.com (custom domain,
# served at the ROOT — so no path prefix). The deploy is GATED: tests + chaos + ledger
# verification must pass in THIS workflow before anything ships.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false   # never cancel an in-flight production deploy

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: node --test tests/unit.test.mjs
      - run: node tests/chaos.mjs
      - run: node audit/verify.mjs

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # Custom domain braveplumhealing.com serves at the ROOT: build with no path prefix.
      - run: npx @11ty/eleventy
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
