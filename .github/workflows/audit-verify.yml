name: Verify audit log integrity

# The immutable "beacon" log must never be silently altered. Verifies the hash chain AND
# enforces append-only history: a push that deletes or rewrites existing ledger lines fails.
# (Chain verification alone cannot detect tail truncation — the git diff check closes that.)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Verify hash-chained audit log
        run: node audit/verify.mjs
      - name: Enforce append-only ledger (no deleted/rewritten lines)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          if git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            DELETED=$(git diff --numstat "${{ github.event.before }}" HEAD -- audit/log.jsonl | awk '{print $2}')
            if [ -n "$DELETED" ] && [ "$DELETED" != "0" ]; then
              echo "::error::audit/log.jsonl had $DELETED line(s) deleted or rewritten — the ledger is append-only."
              exit 1
            fi
          else
            echo "before-SHA not available (force-push or shallow history) — chain check above still applies."
          fi
