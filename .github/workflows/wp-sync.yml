name: Sync content to WordPress (manual)

# One-way repo → WordPress sync. Manual trigger only, and dry-run unless you explicitly
# choose apply=true. Requires repo secrets: WP_SITE, WP_USER, WP_APP_PASSWORD.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Actually write to WordPress? (false = dry run)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx @11ty/eleventy
      - name: Sync to WordPress
        env:
          WP_SITE: ${{ secrets.WP_SITE }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: node scripts/sync-wp.mjs ${{ inputs.apply && '--apply' || '' }}
