name: Tests (unit · chaos · scale)

# End-to-end automated testing for the Brave Plum platform + AIGovOps-HIBT governance.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: node --test tests/unit.test.mjs
      - name: Chaos monkey (ledger tamper-resistance)
        run: node tests/chaos.mjs
      - name: Scale test (bulk build)
        run: node tests/scale.mjs 300
      - name: Build for static checks
        run: npx @11ty/eleventy
      - name: Internal link check (Negri's rot patrol)
        run: node tests/links-check.mjs
      - name: Gentleness check (Daniel Tiger's a11y pass)
        run: node tests/a11y-check.mjs
