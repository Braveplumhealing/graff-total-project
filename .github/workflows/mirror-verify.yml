name: Verify site mirror

# Weekly (and on-demand) check that every page is live on both the GitHub Pages mirror
# and the WordPress site. Opens an issue if drift is detected.

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - id: check
        run: node scripts/mirror-check.mjs | tee mirror-report.txt
        continue-on-error: true
      - name: Open issue on drift
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const body = require('fs').readFileSync('mirror-report.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Mirror drift detected — ${new Date().toISOString().slice(0,10)}`,
              body: '```\n' + body + '\n```',
              labels: ['mirror-drift'],
            });
      - name: Fail if drift
        if: steps.check.outcome == 'failure'
        run: exit 1
