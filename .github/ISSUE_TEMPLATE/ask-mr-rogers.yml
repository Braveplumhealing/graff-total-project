name: Ask Mr Rogers
description: Ask for anything — a change, a question, a worry. Write it like a note to a neighbor.
title: "Ask Mr Rogers: "
labels: ["mr-rogers"]
body:
  - type: markdown
    attributes:
      value: |
        Hi, neighbor. Just say what you'd like in your own words — no technical language needed.
        Mr Rogers will read it, figure out the how, and report back in three warm lines.
  - type: textarea
    id: the-note
    attributes:
      label: What can Mr Rogers do for you?
      description: One friendly box. Say it however feels natural.
      placeholder: "e.g. Can we warm up the About page? Or — is the site up? Or — I have a worry about…"
    validations:
      required: true
